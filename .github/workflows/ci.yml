name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      # Pinned to supported Python (see requires-python in pyproject.toml).
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - run: |
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
      - run: pip install -e ".[timeseries,fmu,dev]" ruff
      - run: ruff check .
      - run: |
          set +e
          pytest
          code=$?
          if [ $code -eq 5 ]; then exit 0; fi
          exit $code
